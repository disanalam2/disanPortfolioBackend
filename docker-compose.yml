version: '3.8'

services:
  mysql_db:
    image: mysql:8.0
    container_name: disan_portfolio_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-portfolio_db}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./disanPortfolioBackend
      dockerfile: Dockerfile
    container_name: disan_portfolio_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=mysql_db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_NAME=${DB_NAME:-portfolio_db}
    env_file:
      - ./disanPortfolioBackend/.env
    depends_on:
      - mysql_db
    restart: unless-stopped

  frontend:
    build:
      context: ./disanPortfoliomain/disanPortfolio
      dockerfile: Dockerfile
    container_name: disan_portfolio_frontend
    ports:
      - "80:80" # Map to port 80 directly for web traffic
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
