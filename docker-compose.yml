version: '3.8'

services:
  mysql_db:
    image: mysql:8.0
    container_name: disan_portfolio_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-portfolio_db}
    command: --innodb-buffer-pool-size=64M
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: disan_portfolio_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=mysql_db
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_NAME=${DB_NAME:-portfolio_db}
    env_file:
      - .env
    depends_on:
      - mysql_db
    restart: unless-stopped

volumes:
  db_data:
